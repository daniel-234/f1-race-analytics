<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>F1 Live Positions</title>
    <script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@main/bundles/datastar.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 800px; margin: 0 auto; }
        .panel { border: 1px solid #ddd; padding: 1rem; margin: 1rem 0; border-radius: 4px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid #eee; }
    </style>
</head>
<body data-signals="{drivers: [], laps: {}, positions: {}}">

    <h1>F1 Live Dashboard</h1>

    <button data-on:click="@get('/live/stream?session_key={{ session_key }}')">
        Start Live Stream
    </button>

    <div id="session-info" class="panel"><p>Click button to start</p></div>
    <div id="status" class="panel"></div>

    <table>
        <thead>
            <tr>
                <th>Pos</th>
                <th>Driver</th>
                <th>Lap</th>
            </tr>
        </thead>
        <tbody id="f1-tbody"></tbody>
    </table>

    <span id="f1-ping" hidden></span>
</body>
</html>
