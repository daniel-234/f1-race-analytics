<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Race Results</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>

  <nav>
    <div class="nav-logo">F1<span> ·</span></div>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
    </ul>
  </nav>

  <header>
    <p class="season-tag">Race Results</p>
    <h1>{{ circuit_id }}</h1>
  </header>

  <section class="races-section">
    <table class="data-table">
      <thead>
        <tr>
          <th>Pos</th>
          <th>Driver</th>
          <th>Points</th>
        </tr>
      </thead>
      <tbody>
        {% for result in results %}
        <tr{% if result.position == 1 %} class="pos-1"{% elif result.position == 2 %} class="pos-2"{% elif result.position == 3 %} class="pos-3"{% endif %}>
          <td>{{ result.position }}</td>
          <td>{{ result.driver.first_name }} {{ result.driver.last_name }}</td>
          <td>{{ result.points }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </section>

</body>
</html>
