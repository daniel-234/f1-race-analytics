<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Driver Standings</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>

  <nav>
    <div class="nav-logo">F1<span> ·</span></div>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/standings/constructors">Constructors standings</a></li>
    </ul>
  </nav>

  <header>
    <p class="season-tag">{{ year }} Season</p>
    <h1>Driver <em>Standings</em></h1>
  </header>

  <section class="races-section">
    <table class="data-table">
      <thead>
        <tr>
          <th>Pos</th>
          <th>Driver</th>
          <th>Nationality</th>
          <th>Points</th>
        </tr>
      </thead>
      <tbody>
        {% for entry in standings %}
        <tr{% if loop.index == 1 %} class="pos-1"{% elif loop.index == 2 %} class="pos-2"{% elif loop.index == 3 %} class="pos-3"{% endif %}>
          <td>{{ loop.index }}</td>
          <td>{{ entry.driver.first_name }} {{ entry.driver.last_name }}</td>
          <td>{{ entry.driver.nationality }}</td>
          <td>{{ entry.points }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </section>

</body>
</html>
